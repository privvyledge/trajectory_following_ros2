/**:
  ros__parameters:
    use_sim_time: False

    wheelbase: 0.256

    horizon: 25
    sample_time: 0.05
    prediction_time: 1.5
    control_rate: 20.0
    saturate_input: True
    allow_reversing: True

    max_speed: 1.5
    min_speed: -1.5
    max_accel: 3.0
    max_decel: -3.0
    max_steer: 27.0
    min_steer: -27.0
    max_steer_rate: 352.9411764706

    max_iter: 15
    termination_condition: 0.1

    R: [0.01, 0.01]
    Rd: [10., 100.]
    Q: [1.0, 1.0, 1.0, 0.01]
    Qf: [0.04, 0.04, 0.1, 0.01]

    generate_mpc_model: True
    build_with_cython: True

    # Bryson's rule weight computation (use_bryson_weights: true ignores Q/R/Rd/Qf above)
    # Q_ii = 1/e_max_i², R_jj = 1/u_max_j², Rd_jj = 1/udot_max_j²
    # Qf is set equal to Q. Rd uses max_jerk and max_steer_rate (already declared above).
    # NOTE: bryson_max_steer is in RADIANS (unlike max_steer which is in degrees).
    use_bryson_weights: false
    max_error_x: 1.0      # m     → Q_x   = 1.0
    max_error_y: 0.3      # m     → Q_y   ≈ 11.1  (tighter laterally)
    max_error_v: 0.5      # m/s   → Q_v   = 4.0
    max_error_psi: 0.1    # rad   → Q_psi = 100.0
    bryson_max_accel: 3.0 # m/s²  → R_a   ≈ 0.11
    bryson_max_steer: 0.4 # rad   → R_d   = 6.25  (NOT degrees)